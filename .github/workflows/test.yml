name: test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Saturno test wrapper
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File ./Scripts/test.ps1 -ProjectRoot $PWD

      - name: Run Saturno build contract
        shell: pwsh
        run: |
          pwsh -File ./Scripts/build.ps1 -ProjectRoot $PWD -BuildNumber 0
          pwsh -File ./Scripts/package.ps1 -ProjectRoot $PWD -BuildNumber 0
