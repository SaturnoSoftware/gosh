name: test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install coverage tool
        run: pip install coverage

      - name: Run CLI tests with coverage
        run: coverage run -m unittest discover -s tests -v && coverage report --fail-under=80

      - name: Run Saturno build contract
        shell: pwsh
        run: |
          pwsh -File ./Scripts/build.ps1 -ProjectRoot $PWD -BuildNumber 0
          pwsh -File ./Scripts/package.ps1 -ProjectRoot $PWD -BuildNumber 0
