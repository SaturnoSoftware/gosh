name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.SATURNO_CI_SUBMODULES_TOKEN }}

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          submodules-token: ${{ secrets.SATURNO_CI_SUBMODULES_TOKEN }}

      - name: Run tests
        shell: pwsh
        run: ./Saturno.CICD/test.ps1 -ProjectRoot $PWD

  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.SATURNO_CI_SUBMODULES_TOKEN }}

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          submodules-token: ${{ secrets.SATURNO_CI_SUBMODULES_TOKEN }}

      - name: Build
        shell: pwsh
        run: ./Saturno.CICD/build.ps1 -ProjectRoot $PWD -BuildNumber $env:GITHUB_RUN_NUMBER

      - name: Package
        id: package
        shell: pwsh
        run: ./Saturno.CICD/package.ps1 -ProjectRoot $PWD -BuildNumber $env:GITHUB_RUN_NUMBER

      - name: Compute release metadata
        id: names
        shell: pwsh
        run: ./Saturno.CICD/release/compute-metadata.ps1 -ProjectRoot $PWD

      - name: Publish GitHub release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./Saturno.CICD/release/publish-github-release.ps1 -Tag $env:GITHUB_REF_NAME -ArchivePath "${{ steps.names.outputs.archive_path }}"
